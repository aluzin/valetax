name: valetax

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: valetax
      POSTGRES_USER: valetax
      POSTGRES_PASSWORD: valetax
    ports:
      - "5432:5432"
    volumes:
      - valetax_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valetax -d valetax"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: src/Valetax.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__ConnectionString: Host=db;Port=5432;Database=valetax;Username=valetax;Password=valetax
      Database__MigrateOnStartup: "true"
      Authentication__RememberMeCode: valetax-dev-code
      Authentication__Jwt__Issuer: Valetax
      Authentication__Jwt__Audience: Valetax
      Authentication__Jwt__SigningKey: valetax-dev-signing-key-32-characters-min
    ports:
      - "8080:8080"
    volumes:
      - valetax_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  valetax_pg:
  valetax_logs:
