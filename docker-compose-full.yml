name: valetax-full

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: valetax
      POSTGRES_USER: valetax
      POSTGRES_PASSWORD: valetax
    ports:
      - "5432:5432"
    volumes:
      - valetax_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valetax -d valetax"]
      interval: 3s
      timeout: 3s
      retries: 20

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - valetax_grafana:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: src/Valetax.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__ConnectionString: Host=db;Port=5432;Database=valetax;Username=valetax;Password=valetax
      Database__MigrateOnStartup: "true"
      Authentication__RememberMeCode: valetax-dev-code
      Authentication__Jwt__Issuer: Valetax
      Authentication__Jwt__Audience: Valetax
      Authentication__Jwt__SigningKey: valetax-dev-signing-key-32-characters-min
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      Serilog__Using__1: Serilog.Sinks.Grafana.Loki
      Serilog__WriteTo__1__Name: GrafanaLoki
      Serilog__WriteTo__1__Args__uri: http://loki:3100
      Serilog__WriteTo__1__Args__labels__0__key: service
      Serilog__WriteTo__1__Args__labels__0__value: Valetax.Api
      Serilog__WriteTo__1__Args__labels__1__key: environment
      Serilog__WriteTo__1__Args__labels__1__value: Development
    ports:
      - "8080:8080"
    volumes:
      - valetax_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      loki:
        condition: service_started
      jaeger:
        condition: service_started

volumes:
  valetax_pg:
  valetax_logs:
  valetax_grafana:
